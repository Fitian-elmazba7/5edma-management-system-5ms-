name: Build Electron Windows Installer

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version to build
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Build Electron
        run: pnpm --filter electron build

      - name: Create installer
        run: pnpm --filter electron dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          $version = npm view @5edma/electron version --prefix apps/electron
          echo "version=$version" >> $env:GITHUB_OUTPUT

      - name: Upload to releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: apps/electron/dist/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: electron-installer-${{ steps.version.outputs.version }}
          path: apps/electron/dist/**/*.exe
          retention-days: 30

      - name: Create release notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "# 5edma Management System v${{ steps.version.outputs.version }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Download" >> RELEASE_NOTES.md
          echo "Download the Windows installer: [5edma Management System Setup.exe]()" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "1. Download the .exe file" >> RELEASE_NOTES.md
          echo "2. Run the installer" >> RELEASE_NOTES.md
          echo "3. Follow the installation wizard" >> RELEASE_NOTES.md
          echo "4. Launch from Start Menu or Desktop" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## What's New" >> RELEASE_NOTES.md
          echo "See CHANGELOG.md for details" >> RELEASE_NOTES.md

      - name: Notify Slack
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ Electron installer built successfully",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*5edma Desktop App v${{ steps.version.outputs.version }}*\n\nWindows installer ready for download"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
