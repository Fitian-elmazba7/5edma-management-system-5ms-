name: Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check web app
        run: pnpm --filter web typecheck

      - name: Type check electron app
        run: pnpm --filter electron typecheck

      - name: Type check functions
        run: pnpm --filter functions typecheck

      - name: Build web app
        run: pnpm --filter web build

      - name: Build functions
        run: pnpm --filter functions build

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter web build

      - name: Build functions
        run: pnpm --filter functions build

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_FITIAN_EL_MAZBA7 }}
          channelId: live
          projectId: fitian-el-mazba7

      - name: Deploy Functions
        run: |
          npm install -g firebase-tools
          firebase deploy --only functions --project=fitian-el-mazba7 --token=${{ secrets.FIREBASE_DEPLOY_TOKEN }}

      - name: Deploy Rules
        run: |
          firebase deploy --only firestore:rules,firestore:indexes --project=fitian-el-mazba7 --token=${{ secrets.FIREBASE_DEPLOY_TOKEN }}

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Build passed! Preview: https://fitian-el-mazba7.web.app'
            })
